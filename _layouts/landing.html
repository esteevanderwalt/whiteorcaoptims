<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta -->
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="{{ site.author }}" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  {% if site.og_image %}
  <meta property="og:image" content="{{ site.url }}{{ site.og_image }}" />
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  {% if site.og_image %}
  <meta name="twitter:image" content="{{ site.url }}{{ site.og_image }}" />
  {% endif %}

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐳</text></svg>" />

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  {{ content }}

  <script>
    // iOS / Android button targeting
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);
      if (isIOS) {
        document.querySelectorAll('.android-btn').forEach(function(el) { el.style.display = 'none'; });
      } else if (isAndroid) {
        document.querySelectorAll('.ios-btn').forEach(function(el) { el.style.display = 'none'; });
      }
    })();

    // FAQ accordion
    document.querySelectorAll('.faq-question').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = this.closest('.faq-item');
        var isOpen = item.classList.contains('open');
        // Close all
        document.querySelectorAll('.faq-item.open').forEach(function(el) {
          el.classList.remove('open');
        });
        // Open clicked if it was closed
        if (!isOpen) item.classList.add('open');
      });
    });
  </script>
</body>
</html>
